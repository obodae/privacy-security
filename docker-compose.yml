version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    restart: always\n    environment:\n      POSTGRES_DB: mydatabase\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n    volumes:\n      - db_data:/var/lib/postgresql/data\n\n  redis:\n    image: redis:latest\n    restart: always\n    ports:\n      - "6379:6379"\n\n  app:\n    build: .\n    restart: always\n    depends_on:\n      - db\n      - redis\n    ports:\n      - "8080:8080"\n    environment:\n      DATABASE_URL: postgres://user:password@db:5432/mydatabase\n      REDIS_URL: redis://redis:6379\n\nvolumes:\n  db_data: